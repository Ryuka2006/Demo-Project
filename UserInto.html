<!DOCTYPE html>
<html lang="km">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KABALL FOR USER</title>
</head>
<style>
   * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f6f8;
      color: #222;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }
    
    .sidebar {
      min-height: 100%;
      width: 220px;
      background: #ffffff;
      border-right: 1px solid #e5e7eb;
      padding: 24px 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .logo {
      font-size: 34px;
      font-weight: bold;
      color: #1f2937;
      margin-bottom: 28px;
    }

    .menu {
      list-style: none;
    }

    .menu li {
      padding: 12px 14px;
      margin-bottom: 8px;
      border-radius: 10px;
      cursor: pointer;
      color: #374151;
      transition: 0.2s;
    }

    .menu li:hover,
    .menu li.active {
      background: #eefafb;
      color: #1aa8bc;
      font-weight: 600;
    }

    .upgrade-btn {
      display: block;
      width: 100%;
      background: #58c8d5;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }

    .main {
      flex: 1;
      padding: 26px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 280px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      outline: none;
    }

    .user-box {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      background: #4f46e5;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .section-card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      margin-top: 22px;
      border: 1px solid #eceff3;
    }

    .select-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      font-weight: 600;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .tool-btn {
      background: white;
      border: 1px solid #dbe1e8;
      padding: 10px 18px;
      border-radius: 10px;
      cursor: pointer;
    }

    .tool-btn.primary {
      background: #57c7d4;
      color: white;
      border: none;
    }

    @media (max-width: 900px) {
      .sidebar {
        width: 90px;
        padding: 20px 10px;
      }

      .logo {
        font-size: 20px;
      }

      .menu li {
        font-size: 12px;
        padding: 10px 8px;
      }
    }

    @media (max-width: 700px) {
      .app {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #e5e7eb;
      }
    }
    #containerUser{
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr ;
    gap: 10px;
}
html {
  scroll-behavior: smooth;
}

</style>

<body>
  <div class="app">
    <aside class="sidebar">
      <div>
        <div class="logo">KABALL</div>
        <ul class="menu">
          <li class="active">Library</li>
          <li>Add Items</li>
          <li>Add Collection</li>
          <li>Dashboards</li>
          <li ><a href="getStarted.html">Logout</a></li>
        </ul>
      </div>
      <button class="upgrade-btn" id="update">Upgrade</button>
    </aside>

    <main class="main">
      <div class="topbar">
        <input class="search-box" id="searchBox" type="text"  placeholder="Start Searching..." />
        <div class="user-box">
          <div>
            <strong>Rak Ki</strong><br />
            <small>Account Menu</small>
          </div>
          <div class="avatar">R</div>
        </div>
      </div>

      <div class="section-card">
        <div class="select-row">
          <span>Select an Option</span>
          <span>&gt;</span>
        </div>
      </div>

      <div class="toolbar">
        <button class="tool-btn">Cover</button>
        <button class="tool-btn">Title</button>
        <button class="tool-btn" id="scroll-down">↓</button>
        <button class="tool-btn primary">Filters</button>
      </div>
      <div id="containerUser"></div>
    </main>
  </div>
<script>
let containerUser = document.getElementById("containerUser");
let searchBox = document.getElementById("searchBox");


const API_URL = "http://localhost/book_library_management_system/api/BookForUser.php";

async function displayUserData(keyword = "") {

    let response = await fetch(API_URL);
    let postuser = await response.json();

    containerUser.innerHTML = "";

    keyword = keyword.toLowerCase();

    postuser.forEach((item) => {

        if (
            (item.UTitle || "").toLowerCase().includes(keyword) ||
            (item.UDescription || "").toLowerCase().includes(keyword)
        ) {

            containerUser.innerHTML += `

            <div style="
                width:190px;
                height:340px;
                margin:15px 0;
                padding:10px;
            ">

                <div style="
                    width:170px;
                    height:180px;
                    border:1px solid;
                    display:flex;
                    justify-content:center;
                    align-items:center;
                ">

                    <img src="${item.UImage || ""}"
                    width="100%"
                    height="100%"
                    style="object-fit:cover;">

                </div>

                <h3 style="font-size:16px;margin-top:5px">
                    ${item.UTitle || ""}
                </h3>

                <p style="font-size:13px">
                    ${item.UDescription || ""}
                </p>
            </div>
            `;
        }

    });

}

searchBox.addEventListener("keyup", function () {
    displayUserData(this.value);
});


window.onload = ()=>{
   displayUserData();
};
</script>
</body>

</html>
